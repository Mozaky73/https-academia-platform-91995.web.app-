<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App - Task Manager</title>
    <link rel="stylesheet" href="css/todo-style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>✓ My To-Do List</h1>
            <p class="subtitle">Organize your tasks efficiently</p>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <div class="input-container">
                <input 
                    type="text" 
                    id="taskInput" 
                    class="task-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button class="add-btn" id="addBtn">
                    <span>➕</span> Add Task
                </button>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
        </section>

        <!-- Stats Section -->
        <section class="stats-section">
            <div class="stat-item">
                <span class="stat-label">Total:</span>
                <span class="stat-value" id="totalTasks">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Completed:</span>
                <span class="stat-value" id="completedCount">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Remaining:</span>
                <span class="stat-value" id="remainingCount">0</span>
            </div>
        </section>

        <!-- Tasks List -->
        <section class="tasks-section">
            <ul class="tasks-list" id="tasksList">
                <!-- Tasks will be added here dynamically -->
            </ul>
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📝</div>
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </section>

        <!-- Action Buttons -->
        <section class="action-section">
            <button class="action-btn" id="clearCompletedBtn">
                🗑️ Clear Completed
            </button>
            <button class="action-btn danger" id="clearAllBtn">
                ⚠️ Clear All
            </button>
        </section>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script src="js/todo-app.js"></script>
</body>
</html>
