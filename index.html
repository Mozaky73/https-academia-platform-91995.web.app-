<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتحاد الجامعات الإسلامية</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
      body {
        font-family: 'Cairo', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg,#764ba2,#667eea 90%);
        min-height: 100vh;
        margin: 0;
        color: #222;
      }
      .main-header {
        text-align: center;
        color: #fff;
        margin-top: 9vh;
        padding: 25px 12px 18px 12px;
      }
      .main-header h1 {
        font-size: 3rem;
        margin-bottom: 16px;
        letter-spacing: 2px;
        font-weight: bold;
        text-shadow: 0 3px 20px #2222, 0 1px 0 #fff8;
      }
      .main-header .subtitle {
        font-size: 1.5rem;
        color: #fff9;
        display: block;
        margin-bottom: 1.5em;
        text-shadow: 0 3px 14px #2224;
      }
      .logo-icon {
        font-size: 4.5rem;
        margin-bottom: 0.2em;
        color: #fff;
        text-shadow: 0 2px 28px #764ba2a0;
      }
      .main-links {
        margin-top: 2.7em;
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1.3em;
      }
      .main-links a {
        background: #fff;
        color: #764ba2;
        font-size: 1.13rem;
        padding: 0.90em 2.4em;
        border-radius: 999px;
        font-weight: bold;
        box-shadow: 0 2px 10px #2222;
        border: none;
        text-decoration: none;
        transition: background 0.18s, color 0.18s, transform .12s;
      }
      .main-links a:hover {
        background: #764ba2;
        color: #fff;
        transform: translateY(-5px) scale(1.06);
      }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="logo-icon">🕌</div>
        <h1>اتحاد الجامعات الإسلامية</h1>
        <span class="subtitle">لغةٌ راسخة، وقرآنٌ هادٍ، وتقنيةٌ تخدم القيم.</span>
        <div class="main-links">
            <a href="dashboard.html">🔐 لوحة التحكم</a>
            <a href="todo.html">📋 قائمة المهام</a>
            <a href="index2.html">🎓 منصة أكاديميا</a>
        </div>
    </header>
</body>
</html>
